server {
    listen 80;
    server_name 40.233.83.234;

    charset utf-8;
    charset_types text/html text/plain text/css application/javascript application/json application/manifest+json image/svg+xml;

    # Staging Basic Auth Protection
    auth_basic "Viec Lam Gan Nha - Staging";
    auth_basic_user_file /var/www/viec-lam-gan-nha/.htpasswd;

    # Frontend static files
    root /var/www/viec-lam-gan-nha/frontend;
    index index.html;

    # API proxy to backend
    location /api/ {
        proxy_pass http://localhost:3001/api/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        
        # Increase timeout for API calls
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    location = /sw.js {
        auth_basic off;
        alias /var/www/viec-lam-gan-nha/frontend/sw.js;
        default_type application/javascript;
        add_header Cache-Control "no-cache" always;
        try_files $uri =404;
    }

    location = /manifest.webmanifest {
        auth_basic off;
        alias /var/www/viec-lam-gan-nha/frontend/manifest.webmanifest;
        default_type application/manifest+json;
        add_header Cache-Control "no-cache" always;
        try_files $uri =404;
    }

    location = /build-info.json {
        auth_basic off;
        alias /var/www/viec-lam-gan-nha/frontend/build-info.json;
        default_type application/json;
        add_header Cache-Control "no-cache" always;
        try_files $uri =404;
    }

    # Health check (no auth)
    location /api/health {
        auth_basic off;
        proxy_pass http://localhost:3001/api/health;
    }

    # Frontend SPA - all routes to index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
}
