server {
    listen 80;
    server_name 40.233.83.234;

    # Frontend static files
    root /var/www/viec-lam-gan-nha/frontend;
    index index.html;

    # ============================================
    # PUBLIC PAGES (No Basic Auth)
    # ============================================
    
    # Home page
    location = / {
        auth_basic off;
        try_files $uri $uri/ /index.html;
    }
    
    # Public job listings
    location /viec-lam {
        auth_basic off;
        try_files $uri $uri/ /index.html;
    }
    
    # Company landing page
    location /nha-tuyen-dung {
        auth_basic off;
        try_files $uri $uri/ /index.html;
    }
    
    # CTV landing page (if exists)
    location /ctv {
        # Check if it's a protected sub-path
        location /ctv/ {
            auth_basic "Viec Lam Gan Nha - Protected";
            auth_basic_user_file /var/www/viec-lam-gan-nha/.htpasswd;
            try_files $uri $uri/ /index.html;
        }
        # Just /ctv is public
        auth_basic off;
        try_files $uri $uri/ /index.html;
    }

    # ============================================
    # PROTECTED DASHBOARDS (Basic Auth Required)
    # ============================================
    
    location /ctv/dashboard {
        auth_basic "Viec Lam Gan Nha - CTV";
        auth_basic_user_file /var/www/viec-lam-gan-nha/.htpasswd;
        try_files $uri $uri/ /index.html;
    }
    
    location /ctv/campaigns {
        auth_basic "Viec Lam Gan Nha - CTV";
        auth_basic_user_file /var/www/viec-lam-gan-nha/.htpasswd;
        try_files $uri $uri/ /index.html;
    }
    
    location /ctv/leads {
        auth_basic "Viec Lam Gan Nha - CTV";
        auth_basic_user_file /var/www/viec-lam-gan-nha/.htpasswd;
        try_files $uri $uri/ /index.html;
    }
    
    location /ctv/commissions {
        auth_basic "Viec Lam Gan Nha - CTV";
        auth_basic_user_file /var/www/viec-lam-gan-nha/.htpasswd;
        try_files $uri $uri/ /index.html;
    }

    location /company/dashboard {
        auth_basic "Viec Lam Gan Nha - Company";
        auth_basic_user_file /var/www/viec-lam-gan-nha/.htpasswd;
        try_files $uri $uri/ /index.html;
    }
    
    location /company/campaigns {
        auth_basic "Viec Lam Gan Nha - Company";
        auth_basic_user_file /var/www/viec-lam-gan-nha/.htpasswd;
        try_files $uri $uri/ /index.html;
    }
    
    location /company/leads {
        auth_basic "Viec Lam Gan Nha - Company";
        auth_basic_user_file /var/www/viec-lam-gan-nha/.htpasswd;
        try_files $uri $uri/ /index.html;
    }
    
    location /company/payments {
        auth_basic "Viec Lam Gan Nha - Company";
        auth_basic_user_file /var/www/viec-lam-gan-nha/.htpasswd;
        try_files $uri $uri/ /index.html;
    }

    location /admin/console {
        auth_basic "Viec Lam Gan Nha - Admin";
        auth_basic_user_file /var/www/viec-lam-gan-nha/.htpasswd;
        try_files $uri $uri/ /index.html;
    }
    
    location /admin/campaigns {
        auth_basic "Viec Lam Gan Nha - Admin";
        auth_basic_user_file /var/www/viec-lam-gan-nha/.htpasswd;
        try_files $uri $uri/ /index.html;
    }
    
    location /admin/leads {
        auth_basic "Viec Lam Gan Nha - Admin";
        auth_basic_user_file /var/www/viec-lam-gan-nha/.htpasswd;
        try_files $uri $uri/ /index.html;
    }
    
    location /admin/reports {
        auth_basic "Viec Lam Gan Nha - Admin";
        auth_basic_user_file /var/www/viec-lam-gan-nha/.htpasswd;
        try_files $uri $uri/ /index.html;
    }

    # ============================================
    # API - PUBLIC ENDPOINTS (No Auth)
    # ============================================
    
    # Health check
    location /api/health {
        auth_basic off;
        proxy_pass http://localhost:3001/api/health;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
    
    # Public job listings API (if exists)
    location /api/jobs {
        auth_basic off;
        proxy_pass http://localhost:3001/api/jobs;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Public apply API (candidate applications)
    location /api/apply {
        auth_basic off;
        proxy_pass http://localhost:3001/api/apply;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_buffering off;
        client_max_body_size 10M;
    }

    # ============================================
    # API - PROTECTED ENDPOINTS (Basic Auth Required)
    # ============================================
    
    location /api/admin/ {
        auth_basic "Viec Lam Gan Nha - Admin API";
        auth_basic_user_file /var/www/viec-lam-gan-nha/.htpasswd;
        proxy_pass http://localhost:3001/api/admin/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
    
    location /api/company/ {
        auth_basic "Viec Lam Gan Nha - Company API";
        auth_basic_user_file /var/www/viec-lam-gan-nha/.htpasswd;
        proxy_pass http://localhost:3001/api/company/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
    
    location /api/ctv/ {
        auth_basic "Viec Lam Gan Nha - CTV API";
        auth_basic_user_file /var/www/viec-lam-gan-nha/.htpasswd;
        proxy_pass http://localhost:3001/api/ctv/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ============================================
    # FALLBACK - Default SPA behavior (Public)
    # ============================================
    
    location / {
        auth_basic off;
        try_files $uri $uri/ /index.html;
    }

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
}
